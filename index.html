    <!DOCTYPE html>
    <html lang="en">
    <head>
      <meta charset="UTF-8">
      <meta name="viewport" content="width=device-width, initial-scale=1.0">
      <link rel="icon" href="culturama-favico.png">
      <link rel="stylesheet" href="css/style.css">
      <link rel="preconnect" href="https://fonts.googleapis.com">
      <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
      <link href="https://fonts.googleapis.com/css2?family=Fjalla+One&family=Work+Sans&display=swap" rel="stylesheet">
      <title>Pesquisa Culturama</title>
    </head>
    <body>
      
      <header>

        <img src="logo-culturama.png" alt="logo culturama">
        <h1>Pesquisa Online</h1>

      </header>

      <section>

        <form action="" method="get">

          <fieldset>
            
            <!-- DADOS PESSOAIS  -->
            
            <legend>Dados pessoais</legend>

            <label for="name">Nome:</label>
            <input id="name"type="text" name="userName" required>
            
            <br>
            
            <label for="age">Idade:</label>
            <input id="age" type="number" name="userAge" min="12" max="100" required>
            
            <br>
            
            <label for="birthDate">Data de nascimento:</label>
            <input id="birthDate" type="date" name="userBirthDate">
            
            <br>
            
            <label for="email">Email:</label>
            <input id="email" type="email" name="userEmail" required>
            
            <br>
            
            <label for="phoneNumber">Telefone:</label>
            <input id="phoneNumber" type="tel" name="userPhoneNumber" pattern="[0-9] {11}" placeholder="DDD + número">
            
            <br>
            
            <label for="image">Upload de foto</label>
            <input id="image" type="file" accept="image/*" name="userImage">
            
            <br>
          
          </fieldset>

          <fieldset>

            <legend>Perfil</legend>
            
            <p>Gênero:</p>
            
            <input id="male" type="radio" name="userGender" value="Masculino">
            <label for="male">Masculino</label>

            <input id="female" type="radio" name="userGender" value="Feminino">
            <label for="female">Feminino</label>

            <input id="notGender" type="radio" name="userGender" value="notInformed">
            <label for="notGender">Prefiro não informar</label>

            <br>

            <label for="maritalStatus">Estado civil:</label>
            <select id="maritalStatus" name="userMaritalStatus">

              <option value="notInformed">Selecione...</option>
              <option value="solteiro">Solteiro</option>
              <option value="casado">Casado</option>
              <option value="divorciado">Divorciado</option>
              <option value="uniaoEstavel">União estável</option>
              

            </select>

            <br>

            
            <label for="state">Estado</label>
            
            <select id="state" name="userState" required>
            
              <option value="notInformed">Selecione...</option>
              <option value="acre">Acre (AC)</option>  
              <option value="alagoas">Alagoas (AL)</option>  
              <option value="amapá">Amapá (AP)</option>  
              <option value="amazonas">Amazonas (AM)</option>  
              <option value="bahia">Bahia (BA)</option>  
              <option value="ceara">Ceará (CE)</option>  
              <option value="distritoFederal">Distrito Federal (DF)</option>  
              <option value="espiritoSanto">Espírito Santo (ES)</option>  
              <option value="goiis">Goiás (GO)</option>  
              <option value="maranhao">Maranhão (MA)</option>  
              <option value="matoGrosso">Mato Grosso (MT)</option>  
              <option value="matoGrossoDoSul">Mato Grosso do Sul (MS)</option>  
              <option value="minasGerais">Minas Gerais (MG)</option>  
              <option value="para">Pará (PA)</option>  
              <option value="paraiba">Paraíba (PB)</option>  
              <option value="parana">Paraná (PR)</option>  
              <option value="pernambuco">Pernambuco (PE)</option>  
              <option value="piaui">Piauí (PI)</option>  
              <option value="rioDeJaneiro">Rio de Janeiro (RJ)</option>  
              <option value="rioGrandeDoNorte">Rio Grande do Norte (RN)</option>  
              <option value="rioGrandeDoSul">Rio Grande do Sul (RS)</option> 
              <option value="rondonia">Rondônia (RO)</option>  
              <option value="roraima">Roraima (RR)</option>  
              <option value="santaCatarina">Santa Catarina (SC)</option>  
              <option value="saoPaulo">São Paulo (SP)</option>  
              <option value="sergipe">Sergipe (SE)</option>  
              <option value="tocantins">Tocantins (TO)</option>  

            </select>

            <br>

            <label for="city">Cidade:</label>
            <input id="city" type="text" name="userCity">

          </fieldset>

          <fieldset>

            <legend>Hábitos</legend>

            <p>Redes Sociais</p>

            <input id="instagram" type="checkbox" name="social" value="instagram">
            <label for="instagram">Instagram</label>
            
            <br>

            <input id="facebook" type="checkbox" name="social" value="facebook">
            <label for="facebook">Facebook</label>

            <br>

            <input id="linkedin" type="checkbox" name="social" value="linkedin">
            <label for="linkedin">LinkedIn</label>
            
            <br>

            <input id="x" type="checkbox" name="social" value="x">
            <label for="x">X</label>
            
            <br>

            <label for="musicStyle">Estilo Musical:</label>
            <input list="styleTypes" id="musicStyle" type="text" name="userMusicStyle">
            
            <datalist id="styleTypes">

              <option value="Rock">
              <option value="Pop">
              <option value="Samba">
              <option value="Sertanejo">      

            </datalist>

            <br>

            <label for="favoriteColor">Cor Favorita:</label>
            <input type="color" name="userColor" id="favoriteColor">

          </fieldset>

          <fieldset>

            <legend>Opinião</legend>
            
            <p>O que você achou do nosso serviço?</p>
            <input type="radio" name="userRate" id="ruim" value="ruim">
            <label for="ruim">Ruim</label>

            <input type="radio" name="userRate" id="regular" value="regular">
            <label for="regular">Regular</label>

            <input type="radio" name="userRate" id="bom" value="bom">
            <label for="bom">Bom</label>

            <input type="radio" name="userRate" id="otimo" value="otimo">
            <label for="otimo">Ótimo</label>

            <br>

            <label for="comment">Escreva a sua opinião</label>
            <textarea id="comment" name="userComment" placeholder="Digite aqui sua opinião..."></textarea>

          </fieldset>

          <fieldset>

            <legend>Confirmações</legend>

            <input type="checkbox" name="userLgpd" id="userLgpdTerm" value="confirmed" required>
            <label for="userLgpdTerm">Eu aceito participar da pesquisa</label>
          
            <br>

            <input type="checkbox" name="userGetResult" id="getResult" value="confirmed">
            <label for="getResult">Desejo receber o resultado da pesquisa por email</label>

          </fieldset>
            
            <button type="submit">Enviar</button>
            <button type="reset">Limpar</button>

        </form>  

      </section>

    </body>
    </html>
