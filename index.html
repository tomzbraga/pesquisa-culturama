    <!DOCTYPE html>
    <html lang="en">
    <head>
      <meta charset="UTF-8">
      <meta name="viewport" content="width=device-width, initial-scale=1.0">
      <title>Pesquisa Culturama</title>
    </head>
    <body>
      
      <header>

        <h1>Pesquisa Online</h1>

      </header>

      <section>

        <form action="" method="get">

          <fieldset>
            
            <!-- DADOS PESSOAIS  -->
            
            <legend>Dados pessoais</legend>

            <label for="userName">Nome:</label>
            <input type="text" name="userName" required>
            
            <br>
            
            <label for="userAge">Idade:</label>
            <input type="number" name="userAge" min="12" max="100" required>
            
            <br>
            
            <label for="userBirthDate">Data de nascimento:</label>
            <input type="date" name="userBirthDate">
            
            <br>
            
            <label for="userEmail">Email:</label>
            <input type="email" name="userEmail" required>
            
            <br>
            
            <label for="userPhoneNumber">Telefone:</label>
            <input type="tel" name="userPhoneNumber" pattern="[0-9] {11}" placeholder="DDD + número">
            
            <br>
            
            <label for="userImage">Upload de foto</label>
            <input type="file" accept="image/*" name="userImage">
            
            <br>
          
          </fieldset>

          <fieldset>

            <legend>Perfil</legend>
            
            <p>Gênero:</p>
            
            <input type="radio" name="userGender" value="Masculino">
            <label for="userGender">Masculino</label>

            <input type="radio" name="userGender" value="Feminino">
            <label for="userGender">Feminino</label>

            <input type="radio" name="userGender" value="notInformed">
            <label for="userGender">Prefiro não informar</label>

            <br>

            <label for="maritalStatus">Estado civil:</label>
            <select name="maritalStatus">

              <option value="notInformed">Selecione...</option>
              <option value="solteiro">Solteiro</option>
              <option value="casado">Casado</option>
              <option value="divorciado">Divorciado</option>
              <option value="uniaoEstavel">União estável</option>
              

            </select>

            <br>

            
            <label for="state">Estado</label>
            
            <select name="state">
            
            <option value="notInformed">Selecione...</option>
            <option value="Acre">Acre (AC)</option>  
            <option value="Alagoas">Alagoas (AL)</option>  
            <option value="Amapá">Amapá (AP)</option>  
            <option value="Amazonas">Amazonas (AM)</option>  
            <option value="Bahia">Bahia (BA)</option>  
            <option value="Ceará">Ceará (CE)</option>  
            <option value="Distrito Federal">Distrito Federal (DF)</option>  
            <option value="Espírito Santo">Espírito Santo (ES)</option>  
            <option value="Goiás">Goiás (GO)</option>  
            <option value="Maranhão">Maranhão (MA)</option>  
            <option value="Mato Grosso">Mato Grosso (MT)</option>  
            <option value="Mato Grosso do Sul">Mato Grosso do Sul (MS)</option>  
            <option value="Minas Gerais">Minas Gerais (MG)</option>  
            <option value="Pará">Pará (PA)</option>  
            <option value="Paraíba">Paraíba (PB)</option>  
            <option value="Paraná">Paraná (PR)</option>  
            <option value="Pernambuco">Pernambuco (PE)</option>  
            <option value="Piauí">Piauí (PI)</option>  
            <option value="Rio de Janeiro">Rio de Janeiro (RJ)</option>  
            <option value="Rio Grande do Norte">Rio Grande do Norte (RN)</option>  
            <option value="Rio Grande do Sul">Rio Grande do Sul (RS)</option> 
            <option value="Rondônia">Rondônia (RO)</option>  
            <option value="Roraima">Roraima (RR)</option>  
            <option value="Santa Catarina">Santa Catarina (SC)</option>  
            <option value="São Paulo">São Paulo (SP)</option>  
            <option value="Sergipe">Sergipe (SE)</option>  
            <option value="Tocantins">Tocantins (TO)</option>  

            </select>

            <br>

            <label for="userCity">Cidade:</label>
            <input type="text" name="userCity">

          </fieldset>
            
            <button type="submit">Enviar</button>

        </form>  

      </section>

    </body>
    </html>
